<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ethio Bingo - History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f0c29] text-white min-h-screen flex flex-col font-sans overflow-x-hidden m-0 p-0">

    <div class="p-6 w-full">
        <h1 class="text-2xl font-black tracking-tight uppercase">Game History</h1>
        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">Your Recent Sessions</p>
    </div>

    <div class="flex-grow px-4 pb-32">
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white/5 border border-white/10 rounded-[1.5rem] p-5">
                <p class="text-[10px] text-gray-500 font-black uppercase mb-1">Total Played</p>
                <div class="flex items-baseline gap-1">
                    <span class="text-2xl font-black">30</span>
                    <span class="text-[10px] text-gray-500 font-bold italic">Games</span>
                </div>
            </div>
            <div class="user-rank-gradient rounded-[1.5rem] p-5">
                <p class="text-[10px] opacity-70 font-black uppercase mb-1">Total Wins</p>
                <div class="flex items-baseline gap-1">
                    <span class="text-2xl font-black">30</span>
                    <span class="text-[10px] opacity-70 font-bold italic">Bingos</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3 mb-6 px-1">
            <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em]">Recent Activity</h2>
            <div class="h-[1px] flex-grow bg-gray-800"></div>
        </div>

        <div id="historyList" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-10 opacity-30">
                <span class="text-4xl mb-2">🕒</span>
                <p class="text-xs font-bold">Loading your history...</p>
            </div>
        </div>
    </div>

    <div class="nav-bar fixed bottom-0 w-full flex justify-around py-4 pb-8 bg-[#0a0a1f] border-t border-gray-900 z-50">
        <a href="index.html" class="nav-item flex flex-col items-center">
            <span class="text-xl">🎮</span>
            <span class="text-[9px] font-bold mt-1">GAME</span>
        </a>
        <a href="scores.html" class="nav-item flex flex-col items-center">
            <span class="text-xl">🏆</span>
            <span class="text-[9px] font-bold mt-1">SCORES</span>
        </a>
        <a href="history.html" class="nav-item active flex flex-col items-center">
            <span class="text-xl">🕒</span>
            <span class="text-[9px] font-bold mt-1">HISTORY</span>
            <div class="active-dot"></div>
        </a>
        <a href="wallet.html" class="nav-item flex flex-col items-center">
            <span class="text-xl">💼</span>
            <span class="text-[9px] font-bold mt-1">WALLET</span>
        </a>
        <a href="profile.html" class="nav-item flex flex-col items-center">
            <span class="text-xl">👤</span>
            <span class="text-[9px] font-bold mt-1">PROFILE</span>
        </a>
    </div>

    <script src="script.js"></script>
</body>
</html>
