<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ethio Bingo - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f0c29] text-white min-h-screen flex flex-col font-sans overflow-x-hidden m-0 p-0">

    <div class="flex-grow px-4 pt-10 pb-32">
        <div class="flex flex-col items-center mb-8">
            <div class="w-24 h-24 rounded-[2rem] border-2 border-purple-500 flex items-center justify-center bg-[#1a1640] mb-4 shadow-xl shadow-purple-500/20">
                <span class="text-4xl font-black italic">W</span>
            </div>
            <h2 class="text-2xl font-black italic">@wase</h2>
            <p class="text-[10px] font-bold text-blue-400 tracking-[0.2em] uppercase mt-1">Verified Player</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-[#161336] rounded-[1.5rem] p-5 text-center border border-white/5">
                <p class="text-[9px] text-gray-500 font-black uppercase mb-2">Main Wallet</p>
                <p class="text-xl font-black">0 <span class="text-[10px] text-emerald-500">ETB</span></p>
                <p class="text-[8px] text-emerald-500/60 font-bold mt-1 italic">Withdrawable</p>
            </div>
            <div class="bg-[#161336] rounded-[1.5rem] p-5 text-center border border-white/5">
                <p class="text-[9px] text-gray-500 font-black uppercase mb-2">Play Wallet</p>
                <p class="text-xl font-black">0 <span class="text-[10px] text-blue-400">ETB</span></p>
                <p class="text-[8px] text-blue-400/60 font-bold mt-1 italic">Game Credits</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-8">
            <div class="bg-[#161336] rounded-[1.2rem] p-4 text-center border border-white/5">
                <p class="text-[8px] text-gray-500 font-black uppercase mb-1">Game Win</p>
                <p class="text-lg font-black text-yellow-500">32</p>
            </div>
            <div class="bg-[#161336] rounded-[1.2rem] p-4 text-center border border-white/5">
                <p class="text-[8px] text-gray-500 font-black uppercase mb-1">Total Invite</p>
                <p class="text-lg font-black text-emerald-500">0</p>
            </div>
            <div class="bg-[#161336] rounded-[1.2rem] p-4 text-center border border-white/5">
                <p class="text-[8px] text-gray-500 font-black uppercase mb-1">Total Earned</p>
                <p class="text-lg font-black text-cyan-400">0</p>
            </div>
        </div>

        <div class="bg-[#161336] rounded-[2rem] p-5 flex justify-between items-center border border-white/5 shadow-inner">
            <div class="flex items-center gap-4">
                <div id="soundIconBg" class="w-12 h-12 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-500 transition-colors duration-300">
                    <span id="soundIconText" class="text-xl">🔊</span>
                </div>
                <div>
                    <h4 class="font-black text-sm tracking-wide uppercase">Sound Effects</h4>
                    <p class="text-[9px] text-gray-500 font-bold">Toggle game audio</p>
                </div>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="soundToggle" class="sr-only peer" checked>
                <div class="w-14 h-8 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-emerald-500"></div>
            </label>
        </div>
    </div>

    <div class="nav-bar fixed bottom-0 w-full flex justify-around py-4 pb-8 bg-[#0a0a1f] border-t border-gray-900 z-50">
        <a href="index.html" class="nav-item flex flex-col items-center"><span class="text-xl">🎮</span><span class="text-[9px] font-bold mt-1">GAME</span></a>
        <a href="scores.html" class="nav-item flex flex-col items-center"><span class="text-xl">🏆</span><span class="text-[9px] font-bold mt-1">SCORES</span></a>
        <a href="history.html" class="nav-item flex flex-col items-center"><span class="text-xl">🕒</span><span class="text-[9px] font-bold mt-1">HISTORY</span></a>
        <a href="wallet.html" class="nav-item flex flex-col items-center"><span class="text-xl">💼</span><span class="text-[9px] font-bold mt-1">WALLET</span></a>
        <a href="profile.html" class="nav-item active flex flex-col items-center">
            <span class="text-xl">👤</span>
            <span class="text-[9px] font-bold mt-1">PROFILE</span>
            <div class="active-dot"></div>
        </a>
    </div>

    <script src="script.js"></script>
</body>
</html>
