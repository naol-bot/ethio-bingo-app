<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Ethio Bingo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ለ Toggle Switch የሚሆን ስታይል */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #30363d; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-top: 20px;">
            <div style="width: 80px; height: 80px; background: #0d1117; border: 3px solid #3b82f6; border-radius: 25px; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; font-style: italic; font-weight: bold; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);">T</div>
            <h2 style="margin: 15px 0 5px;">@Tewdaj</h2>
            <p style="color: #3b82f6; font-size: 10px; font-weight: bold; letter-spacing: 2px;">VERIFIED PLAYER</p>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <div style="flex: 1; background: rgba(22, 27, 34, 0.8); padding: 15px; border-radius: 20px; border: 1px solid #30363d; text-align: center;">
                <p style="margin: 0; font-size: 9px; color: #8b949e; font-weight: bold;">MAIN WALLET</p>
                <h2 style="margin: 5px 0;">2 <span style="font-size: 10px; color: #10b981;">ETB</span></h2>
                <p style="margin: 0; font-size: 8px; color: #10b981; font-style: italic;">Withdrawable</p>
            </div>
            <div style="flex: 1; background: rgba(22, 27, 34, 0.8); padding: 15px; border-radius: 20px; border: 1px solid #30363d; text-align: center;">
                <p style="margin: 0; font-size: 9px; color: #8b949e; font-weight: bold;">PLAY WALLET</p>
                <h2 style="margin: 5px 0;">2 <span style="font-size: 10px; color: #3b82f6;">ETB</span></h2>
                <p style="margin: 0; font-size: 8px; color: #3b82f6; font-style: italic;">Game Credits</p>
            </div>
        </div>

        <div style="display: flex; gap: 8px; margin-top: 15px;">
            <div style="flex: 1; background: rgba(22, 27, 34, 0.6); padding: 10px; border-radius: 15px; border: 1px solid #30363d; text-align: center;">
                <p style="margin: 0; font-size: 8px; color: #8b949e;">GAME WIN</p>
                <h3 style="margin: 5px 0; color: #f59e0b;">1</h3>
            </div>
            <div style="flex: 1; background: rgba(22, 27, 34, 0.6); padding: 10px; border-radius: 15px; border: 1px solid #30363d; text-align: center;">
                <p style="margin: 0; font-size: 8px; color: #8b949e;">TOTAL INVITE</p>
                <h3 style="margin: 5px 0; color: white;">0</h3>
            </div>
            <div style="flex: 1; background: rgba(22, 27, 34, 0.6); padding: 10px; border-radius: 15px; border: 1px solid #30363d; text-align: center;">
                <p style="margin: 0; font-size: 8px; color: #8b949e;">TOTAL EARNED</p>
                <h3 style="margin: 5px 0; color: white;">0</h3>
            </div>
        </div>

        <div style="margin-top: 20px; background: rgba(22, 27, 34, 0.8); padding: 15px; border-radius: 20px; border: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 24px; color: #10b981;">🔊</span>
                <div>
                    <p style="margin: 0; font-weight: bold; font-size: 13px;">SOUND EFFECTS</p>
                    <p style="margin: 0; font-size: 10px; color: #8b949e;">Toggle game audio</p>
                </div>
            </div>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="window.location.href='index.html'">🎮<br>GAME</div>
            <div class="nav-item" onclick="window.location.href='scores.html'">🏆<br>SCORES</div>
            <div class="nav-item" onclick="window.location.href='history.html'">🕒<br>HISTORY</div>
            <div class="nav-item" onclick="window.location.href='wallet.html'">💼<br>WALLET</div>
            <div class="nav-item active" onclick="window.location.href='profile.html'">👤<br>PROFILE</div>
        </div>
    </div>
</body>
</html>
