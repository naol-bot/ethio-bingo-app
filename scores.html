<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ethio Bingo - Scores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f0c29] text-white min-h-screen flex flex-col font-sans overflow-x-hidden m-0 p-0">

    <div class="p-5 w-full">
        <h1 class="text-[10px] font-bold tracking-[0.2em] opacity-60 uppercase">Ethio Bingo</h1>
    </div>

    <div class="flex-grow px-4 pb-32">
        <div class="user-rank-gradient rounded-[2.2rem] p-6 mb-6 flex justify-between items-center shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-xl font-bold">-</div>
                <div>
                    <p class="text-[10px] opacity-70 font-bold uppercase tracking-[0.1em]">My Rank</p>
                    <h3 class="text-xl font-black">@WASE</h3>
                    <p class="text-[10px] opacity-70 font-bold uppercase">UNRANKED</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-3xl font-black">0</p>
                <p class="text-[10px] opacity-70 font-bold uppercase tracking-tighter">Played</p>
            </div>
        </div>

        <div class="toggle-container p-1.5 rounded-[1.2rem] flex mb-8">
            <button class="flex-1 py-3 rounded-xl text-xs font-bold toggle-active transition-all duration-300">DAILY</button>
            <button class="flex-1 py-3 text-gray-500 text-xs font-bold transition-all duration-300">WEEKLY</button>
        </div>

        <div id="playerList" class="space-y-3">
            <p class="text-center opacity-50">Loading scores...</p>
        </div>
    </div>

    <div class="nav-bar fixed bottom-0 w-full flex justify-around py-4 pb-8 bg-[#0a0a1f] border-t border-gray-900 z-50">
        <a href="index.html" class="nav-item flex flex-col items-center">
            <span class="text-xl">🎮</span>
            <span class="text-[9px] font-bold mt-1">GAME</span>
        </a>
        <a href="scores.html" class="nav-item active flex flex-col items-center">
            <span class="text-xl">🏆</span>
            <span class="text-[9px] font-bold mt-1">SCORES</span>
            <div class="active-dot"></div>
        </a>
        <a href="history.html" class="nav-item flex flex-col items-center">
            <span class="text-xl">🕒</span>
            <span class="text-[9px] font-bold mt-1">HISTORY</span>
        </a>
        <a href="wallet.html" class="nav-item flex flex-col items-center">
            <span class="text-xl">💼</span>
            <span class="text-[9px] font-bold mt-1">WALLET</span>
        </a>
        <a href="profile.html" class="nav-item flex flex-col items-center">
            <span class="text-xl">👤</span>
            <span class="text-[9px] font-bold mt-1">PROFILE</span>
        </a>
    </div>

    <script src="script.js"></script>
</body>
</html>
