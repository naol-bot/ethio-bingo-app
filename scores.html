<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Dil Bingo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="my-rank-card">
            <div class="rank-avatar">-</div>
            <div class="rank-info">
                <p class="rank-label">MY RANK</p>
                <h3 id="player-username">@Ethiobingo02</h3>
                <p class="unranked">UNRANKED</p>
            </div>
            <div class="played-stat">
                <span class="stat-num">0</span>
                <span class="stat-label">PLAYED</span>
            </div>
        </div>

        <div class="tab-container">
            <button class="tab-btn active">DAILY</button>
            <button class="tab-btn">WEEKLY</button>
        </div>

        <p class="list-title">TOP 10 PLAYERS</p>

        <main class="score-list">
            <div class="player-row">
                <span class="rank-badge gold">1</span>
                <span class="user-handle">@AYAA</span>
                <span class="game-count">45 GAMES</span>
            </div>
            <div class="player-row">
                <span class="rank-badge silver">2</span>
                <span class="user-handle">@ናርዶስ_ፈቃዱ</span>
                <span class="game-count">27 GAMES</span>
            </div>
            <div class="player-row">
                <span class="rank-badge bronze">3</span>
                <span class="user-handle">@CHALA</span>
                <span class="game-count">21 GAMES</span>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">🎮<br>GAME</a>
            <a href="scores.html" class="nav-item active">🏆<br>SCORES</a>
            <a href="history.html" class="nav-item">🕒<br>HISTORY</a>
            <a href="wallet.html" class="nav-item">💼<br>WALLET</a>
            <a href="profile.html" class="nav-item">👤<br>PROFILE</a>
        </nav>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('player-username').innerText = "@" + (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name);
        }
    </script>
</body>
</html>
