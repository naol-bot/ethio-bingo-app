<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Ethio Bingo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="scores-page">
    <div class="container">
        <header style="padding: 15px;">
            <span class="logo" style="color: #f59e0b; font-weight: bold; font-size: 1.2rem;">ETHIO BINGO</span>
        </header>

        <div class="my-rank-header">
            <div class="user-box">
                <div class="user-avatar">👤</div>
                <div class="user-info">
                    <p>MY RANK</p>
                    <h3 id="player-user">@USER</h3>
                    <p>UNRANKED</p>
                </div>
            </div>
            <div class="played-count">
                <b>0</b>
                <span>PLAYED</span>
            </div>
        </div>

        <div class="tab-container">
            <button id="daily-btn" class="tab-btn active" onclick="changeTab('daily')">DAILY</button>
            <button id="weekly-btn" class="tab-btn" onclick="changeTab('weekly')">WEEKLY</button>
        </div>

        <p style="padding-left: 20px; color: #848d97; font-size: 0.8rem; margin-bottom: 15px;">TOP 10 PLAYERS</p>

        <div id="daily-list" class="leaderboard-list">
            <div class="player-card">
                <div class="rank-badge gold">1</div>
                <span class="player-name">@AYAA</span>
                <div class="player-score"><b>45</b><small>GAMES</small></div>
            </div>
            <div class="player-card">
                <div class="rank-badge silver">2</div>
                <span class="player-name">@ናርዶስ_ፈቃዱ</span>
                <div class="player-score"><b>27</b><small>GAMES</small></div>
            </div>
            <div class="player-card">
                <div class="rank-badge bronze">3</div>
                <span class="player-name">@CHALA</span>
                <div class="player-score"><b>21</b><small>GAMES</small></div>
            </div>
        </div>

        <div id="weekly-list" class="leaderboard-list" style="display: none;">
            <div class="player-card">
                <div class="rank-badge gold">1</div>
                <span class="player-name">@WONDIMU</span>
                <div class="player-score"><b>120</b><small>GAMES</small></div>
            </div>
            <div class="player-card">
                <div class="rank-badge silver">2</div>
                <span class="player-name">@ETHIO_KING</span>
                <div class="player-score"><b>98</b><small>GAMES</small></div>
            </div>
            <div class="player-card">
                <div class="rank-badge bronze">3</div>
                <span class="player-name">@SARA_B</span>
                <div class="player-score"><b>85</b><small>GAMES</small></div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">🎮<br>GAME</a>
            <a href="scores.html" class="nav-item active">🏆<br>SCORES</a>
            <a href="history.html" class="nav-item">🕒<br>HISTORY</a>
            <a href="wallet.html" class="nav-item">💼<br>WALLET</a>
            <a href="profile.html" class="nav-item">👤<br>PROFILE</a>
        </nav>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ታቦቹን ለመቀያየር የሚያገለግል ፈንክሽን
        function changeTab(type) {
            const dailyList = document.getElementById('daily-list');
            const weeklyList = document.getElementById('weekly-list');
            const dailyBtn = document.getElementById('daily-btn');
            const weeklyBtn = document.getElementById('weekly-btn');

            if (type === 'daily') {
                dailyList.style.display = 'block';
                weeklyList.style.display = 'none';
                dailyBtn.classList.add('active');
                weeklyBtn.classList.remove('active');
            } else {
                dailyList.style.display = 'none';
                weeklyList.style.display = 'block';
                weeklyBtn.classList.add('active');
                dailyBtn.classList.remove('active');
            }
        }

        // የተጫዋቹን ስም ከቴሌግራም መውሰጃ
        let tg = window.Telegram.WebApp;
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('player-user').innerText = "@" + (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name).toUpperCase();
        }
    </script>
</body>
</html>
