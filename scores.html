<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Ethio Bingo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="my-rank-card">
            <div class="rank-avatar">-</div>
            <div class="rank-info">
                <p class="rank-label">MY RANK</p>
                <h3 id="player-username">@USER</h3>
                <p class="unranked">UNRANKED</p>
            </div>
            <div class="played-stat">
                <span class="stat-num">0</span>
                <span class="stat-label">PLAYED</span>
            </div>
        </div>

        <div class="tab-container">
            <button class="tab-btn active">DAILY</button>
            <button class="tab-btn">WEEKLY</button>
        </div>

        <p class="list-title">TOP 10 PLAYERS</p>

        <main class="score-list">
            <div class="player-row">
                <span class="rank-badge gold">1</span>
                <span class="user-handle">@AYAA</span>
                <span class="game-count">45 GAMES</span>
            </div>
            <div class="player-row">
                <span class="rank-badge silver">2</span>
                <span class="user-handle">@ናርዶስ_ፈቃዱ</span>
                <span class="game-count">27 GAMES</span>
            </div>
            <div class="player-row">
                <span class="rank-badge bronze">3</span>
                <span class="user-handle">@CHALA</span>
                <span class="game-count">21 GAMES</span>
            </div>
            </main>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="window.location.href='index.html'">🎮<br>GAME</div>
            <div class="nav-item active" onclick="window.location.href='scores.html'">🏆<br>SCORES</div>
            <div class="nav-item" onclick="window.location.href='history.html'">🕒<br>HISTORY</div>
            <div class="nav-item" onclick="window.location.href='wallet.html'">💼<br>WALLET</div>
            <div class="nav-item" onclick="window.location.href='profile.html'">👤<br>PROFILE</div>
        </nav>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('player-username').innerText = "@" + (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name);
        }
    </script>
</body>
</html>
