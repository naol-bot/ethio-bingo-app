<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f0c29] text-white min-h-screen flex flex-col font-sans overflow-hidden">

    <div class="flex justify-between items-center p-5">
        <h1 class="text-sm font-bold tracking-widest opacity-80">ETHIO BINGO</h1>
        <button onclick="toggleRules()" class="bg-gray-800/60 border border-gray-600 px-5 py-1 rounded-full text-xs hover:bg-gray-700 transition">Rules</button>
    </div>

    <div class="flex-grow flex flex-col items-center justify-center px-6 -mt-10">
        <p class="text-gray-400 text-lg mb-1">Welcome to</p>
        <h2 class="text-5xl font-black text-yellow-500 italic mb-10 tracking-tighter drop-shadow-[0_2px_10px_rgba(234,179,8,0.3)]">
            ETHIO BINGO
        </h2>

        <div class="w-full max-w-sm bg-[#1a1a3a]/90 border border-gray-800 rounded-[2.5rem] p-10 flex flex-col items-center shadow-2xl relative overflow-hidden">
            <p class="text-[10px] uppercase tracking-[0.3em] text-gray-500 mb-4 font-bold">Choose your stake</p>
            <div class="w-12 h-[3px] bg-yellow-500 rounded-full mb-8 shadow-[0_0_15px_#eab308]"></div>

            <button id="playBtn" class="w-full bg-[#00c896] hover:bg-[#00ab81] text-[#0f0c29] text-2xl font-black py-4 rounded-2xl flex items-center justify-center gap-3 transition-transform active:scale-95 shadow-[0_5px_20px_rgba(0,200,150,0.3)]">
                <span class="text-xl">▶</span> PLAY 10
            </button>

            <div class="mt-10 text-center">
                <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 font-bold">Wallet Balance</p>
                <p class="text-4xl font-bold tracking-tight">0</p>
            </div>
        </div>
    </div>

    <div class="bg-[#0a0a1f] border-t border-gray-900 flex justify-around py-4 pb-6">
        <a href="index.html" class="flex flex-col items-center gap-1 group">
            <span class="text-xl drop-shadow-[0_0_8px_#00c896]">🎮</span>
            <span class="text-[10px] font-bold text-[#00c896]">GAME</span>
            <div class="w-1 h-1 bg-[#00c896] rounded-full mt-1 shadow-[0_0_5px_#00c896]"></div>
        </a>
        <a href="scores.html" class="flex flex-col items-center gap-1 text-gray-600 opacity-70">
            <span class="text-xl">🏆</span>
            <span class="text-[10px] font-bold">SCORES</span>
        </a>
        <a href="history.html" class="flex flex-col items-center gap-1 text-gray-600 opacity-70">
            <span class="text-xl">🕒</span>
            <span class="text-[10px] font-bold">HISTORY</span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center gap-1 text-gray-600 opacity-70">
            <span class="text-xl">💼</span>
            <span class="text-[10px] font-bold">WALLET</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-gray-600 opacity-70">
            <span class="text-xl">👤</span>
            <span class="text-[10px] font-bold">PROFILE</span>
        </a>
    </div>

    <div id="rulesModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-6 z-50">
        <div class="bg-[#1a1a3a] border border-gray-700 w-full max-w-xs rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold text-yellow-500 mb-4">የጨዋታው ህግጋት 📜</h3>
            <ul class="text-sm text-gray-300 space-y-3">
                <li>• ለመጀመር የ 10 ብር Stake ይምረጡ።</li>
                <li>• ቁጥሮች በዘፈቀደ (Random) ይወጣሉ።</li>
                <li>• መስመር የሞላ ቀድሞ 'Bingo' ይላል።</li>
                <li>• ያሸነፉት ገንዘብ ወዲያው ወደ Wallet ይገባል።</li>
            </ul>
            <button onclick="toggleRules()" class="w-full mt-6 bg-gray-700 py-3 rounded-xl font-bold">ተረዳሁ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
