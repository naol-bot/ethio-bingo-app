    <!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ETHIO BINGO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        
        <div id="home-page" class="page active">
            <div class="header">
                <span class="logo-text">ETHIO BINGO</span>
                <button class="rules-top-btn" onclick="openRules()">Rules</button>
            </div>

            <div class="hero-section">
                <p class="welcome-msg">Welcome to</p>
                <h1 class="main-title">ETHIO BINGO</h1>
            </div>

            <div class="stake-card">
                <p class="stake-label">CHOOSE YOUR STAKE</p>
                <div class="yellow-line"></div>
                <button class="play-btn" onclick="startGame()">
                    <i class="fas fa-play"></i> PLAY 10
                </button>
                <p class="balance-label">WALLET BALANCE</p>
                <p class="balance-value">0</p>
            </div>
        </div>

        <div id="rules-overlay" class="rules-overlay">
            <div class="rules-header">
                <button class="back-icon" onclick="closeRules()">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <h2 class="rules-title">ቢንጎ ህጎች</h2>
            </div>

            <div class="rules-tabs">
                <div class="tab-item active" onclick="switchTab(0)">
                    <i class="fas fa-joker"></i>
                    <span>መረጣ</span>
                </div>
                <div class="tab-item" onclick="switchTab(1)">
                    <i class="fas fa-gamepad"></i>
                    <span>ጨዋታ</span>
                </div>
                <div class="tab-item" onclick="switchTab(2)">
                    <i class="fas fa-trophy"></i>
                    <span>አሸናፊ</span>
                </div>
                <div class="tab-item" onclick="switchTab(3)">
                    <i class="fas fa-ban"></i>
                    <span>ቅጣት</span>
                </div>
            </div>

            <div id="rules-content-area" class="rules-body">
                </div>
        </div>

        <div class="main-nav">
            <div class="nav-item active" onclick="setNavActive(this)">
                <i class="fas fa-gamepad"></i>
                <span>GAME</span>
            </div>
            <div class="nav-item" onclick="setNavActive(this)">
                <i class="fas fa-trophy"></i>
                <span>SCORES</span>
            </div>
            <div class="nav-item" onclick="setNavActive(this)">
                <i class="fas fa-history"></i>
                <span>HISTORY</span>
            </div>
            <div class="nav-item" onclick="setNavActive(this)">
                <i class="fas fa-wallet"></i>
                <span>WALLET</span>
            </div>
            <div class="nav-item" onclick="setNavActive(this)">
                <i class="fas fa-user"></i>
                <span>PROFILE</span>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
