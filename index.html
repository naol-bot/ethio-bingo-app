<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dil Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f0c29] text-white min-h-screen flex flex-col font-sans overflow-hidden m-0 p-0">

    <div id="welcomeScreen" class="flex flex-col min-h-screen">
        <div class="flex justify-between items-center p-5 w-full">
            <h1 class="text-[10px] font-bold tracking-[0.2em] opacity-60 uppercase">Dil Bingo</h1>
            <button onclick="toggleRules()" class="bg-gray-800/40 border border-gray-700 px-4 py-1 rounded-full text-[10px]">Rules</button>
        </div>

        <div class="flex-grow flex flex-col items-center justify-center -mt-10">
            <p class="text-gray-400 text-sm mb-1">Welcome to</p>
            <h2 class="text-yellow-500 text-center text-5xl font-black mb-10 tracking-tighter shadow-yellow-500/20 shadow-2xl italic">DIL BINGO</h2>

            <div class="play-card flex flex-col items-center bg-[#1a1a3a]/60 p-10 rounded-[2.5rem] border border-gray-800 shadow-2xl w-[85%] max-w-sm">
                <p class="text-[9px] uppercase tracking-[0.3em] text-gray-500 mb-4 font-bold">Choose your stake</p>
                <div class="w-10 h-[2px] bg-yellow-500 rounded-full mb-8 shadow-[0_0_10px_#eab308]"></div>

                <button id="playBtn" onclick="startPlay()" class="bg-[#00c896] hover:bg-[#00b085] text-white font-black w-full py-5 rounded-[1.5rem] text-xl shadow-[0_10px_20px_rgba(0,200,150,0.3)] transition-all active:scale-95 flex items-center justify-center gap-3">
                    <span class="text-sm">▶</span> PLAY 10
                </button>

                <div class="mt-8 text-center">
                    <p class="text-[9px] uppercase tracking-widest text-gray-400 mb-1 font-bold opacity-70">Wallet Balance</p>
                    <p id="mainBalanceDisplay" class="text-4xl font-bold tracking-tight">0</p>
                </div>
            </div>
        </div>
    </div>

    <div id="mainGameScreen" class="fixed inset-0 bg-[#0f0c29] z-40 hidden flex flex-col p-2 overflow-y-auto pb-32">
        <div class="sticky top-0 bg-[#0f0c29]/95 backdrop-blur-md z-50 p-2 border-b border-gray-800">
            <div class="flex justify-between items-center mb-3">
                <button onclick="closeGame()" class="text-[10px] bg-gray-800/60 px-4 py-1.5 rounded-xl border border-gray-700">← Back</button>
                <button onclick="location.reload()" class="text-[10px] bg-[#1a1a3a] px-4 py-1.5 rounded-xl border border-gray-700 flex items-center gap-2">Refresh 🔄</button>
            </div>
            
            <div class="grid grid-cols-4 gap-1 items-center">
                <div class="bg-gray-900/50 p-1.5 rounded-xl border border-gray-800 text-center">
                    <p class="text-[7px] text-gray-500 uppercase font-bold">Main</p>
                    <p id="main-wallet-val" class="text-[11px] font-bold">0</p>
                </div>
                <div class="bg-gray-900/50 p-1.5 rounded-xl border border-gray-800 text-center">
                    <p class="text-[7px] text-gray-500 uppercase font-bold">Play</p>
                    <p id="play-wallet-val" class="text-[11px] font-bold">0</p>
                </div>
                <div class="bg-gray-900/50 p-1.5 rounded-xl border border-gray-800 text-center">
                    <p class="text-[7px] text-gray-500 uppercase font-bold">Stake</p>
                    <p class="text-[11px] font-bold">10</p>
                </div>
                <div id="game-timer" class="bg-yellow-500/10 border border-yellow-500/50 text-yellow-500 font-black py-2 rounded-xl text-center text-sm transition-all duration-300">
                    45 s
                </div>
            </div>
        </div>

        <div id="numbers-grid" class="grid grid-cols-8 gap-1 mt-4 p-1"></div>

        <div id="cartela-section" class="mt-4 p-2 hidden border-t border-gray-800/50 pt-4">
            <div id="cartela-container" class="flex flex-wrap justify-center gap-4"></div>
        </div>
    </div>

    <div class="nav-bar fixed bottom-0 w-full flex justify-around py-4 pb-8 bg-[#0a0a1f] border-t border-gray-900 z-30">
        <a href="#" class="flex flex-col items-center text-[#00c896]">
            <span class="text-xl">🎮</span>
            <span class="text-[8px] font-bold mt-1 uppercase tracking-widest">Game</span>
        </a>
        <a href="#" class="flex flex-col items-center opacity-40"><span class="text-xl">🏆</span></a>
        <a href="#" class="flex flex-col items-center opacity-40"><span class="text-xl">🕒</span></a>
        <a href="#" class="flex flex-col items-center opacity-40"><span class="text-xl">💼</span></a>
        <a href="#" class="flex flex-col items-center opacity-40"><span class="text-xl">👤</span></a>
    </div>

    <div id="rulesModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[60] backdrop-blur-md">
        <div class="bg-[#1a1a3a] border border-gray-700 w-full max-w-xs rounded-[2.5rem] p-8 text-center">
            <h3 class="text-xl font-bold text-yellow-500 mb-4 italic">የጨዋታው ህግጋት 📜</h3>
            <p class="text-xs text-gray-300 leading-relaxed mb-6">ለመጀመር የ 10 ብር Stake ይምረጡ። 4 ሰከንድ እስኪቀረው ቁጥር መምረጥ ይችላሉ። የያዙት ካርቴላ ካሸነፈ ገንዘቡ ወደ Wallet ይገባል።</p>
            <button onclick="toggleRules()" class="w-full bg-[#00c896] py-3 rounded-xl font-bold text-sm text-white">ተረዳሁ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
