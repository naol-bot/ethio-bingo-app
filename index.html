<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Bingo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <span class="logo">ETHIO BINGO</span>
            <button class="rules-btn">Rules</button>
        </header>

        <main class="main-content">
            <div class="welcome-section">
                <p>Welcome to</p>
                <h1 class="brand-name">ETHIO BINGO</h1>
                <p class="stake-text">CHOOSE YOUR STAKE</p>
            </div>

            <div class="divider"></div>

            <button class="play-btn">
                <i class="fas fa-play"></i> PLAY 10
            </button>

            <div class="balance-section">
                <p>WALLET BALANCE</p>
                <h2 id="user-balance">0.00</h2>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">
                <i class="fas fa-gamepad"></i>
                <span>GAME</span>
            </a>
            <a href="scores.html" class="nav-item">
                <i class="fas fa-trophy"></i>
                <span>SCORES</span>
            </a>
            <a href="history.html" class="nav-item">
                <i class="fas fa-history"></i>
                <span>HISTORY</span>
            </a>
            <a href="wallet.html" class="nav-item">
                <i class="fas fa-wallet"></i>
                <span>WALLET</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>PROFILE</span>
            </a>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
