<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIO BINGO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="main-screen" class="container">
        <div class="header">
            <span class="close-btn">✕</span>
            <span class="title">ETHIO BINGO</span>
            <span class="menu-btn">⋮</span>
        </div>

        <div class="hero">
            <button class="rules-btn" onclick="showRules()">Rules</button>
            <p class="welcome-text">Welcome to</p>
            <h1 class="main-logo">ETHIO BINGO</h1>
        </div>

        <div class="play-card">
            <p class="stake-label">CHOOSE YOUR STAKE</p>
            <div class="divider"></div>
            <button class="play-button" onclick="startGame()">
                <i class="fas fa-play"></i> PLAY 10
            </button>
            <p class="wallet-label">WALLET BALANCE</p>
            <p class="balance-amount">0</p>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active">
                <i class="fas fa-gamepad"></i>
                <span>GAME</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-trophy"></i>
                <span>SCORES</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-clock"></i>
                <span>HISTORY</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-briefcase"></i>
                <span>WALLET</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-user"></i>
                <span>PROFILE</span>
            </div>
        </div>
    </div>

    <div id="rules-screen" class="container hidden">
        <div class="header">
            <button class="back-btn" onclick="hideRules()">❮</button>
            <span class="title">ቢንጎ ህጎች</span>
        </div>

        <div class="rules-tabs">
            <div class="tab active" onclick="switchTab('tab1')"><i class="fas fa-id-card"></i><br>መራጭ</div>
            <div class="tab" onclick="switchTab('tab2')"><i class="fas fa-gamepad"></i><br>ጨዋታ</div>
            <div class="tab" onclick="switchTab('tab3')"><i class="fas fa-trophy"></i><br>አሸናፊ</div>
            <div class="tab" onclick="switchTab('tab4')"><i class="fas fa-ban"></i><br>ቅጣት</div>
        </div>

        <div id="tab-content" class="tab-content">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
