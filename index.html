<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ethio Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f0c29] text-white min-h-screen flex flex-col font-sans overflow-hidden">

    <div class="flex justify-between items-center p-5 w-full">
        <h1 class="text-[10px] font-bold tracking-[0.2em] opacity-60">ETHIO BINGO</h1>
        <button onclick="toggleRules()" class="bg-gray-800/40 border border-gray-700 px-4 py-1 rounded-full text-[10px]">Rules</button>
    </div>

    <div class="flex-grow flex flex-col items-center justify-center -mt-12">
        <p class="text-gray-400 text-base mb-1">Welcome to</p>
        <h2 class="ethio-title">ETHIO BINGO</h2>

        <div class="play-card">
            <p class="text-[9px] uppercase tracking-[0.3em] text-gray-500 mb-4 font-bold">Choose your stake</p>
            <div class="w-10 h-[2px] bg-yellow-500 rounded-full mb-8 shadow-[0_0_10px_#eab308]"></div>

            <button id="playBtn" class="play-button">
                ▶ PLAY 10
            </button>

            <div class="mt-8 text-center">
                <p class="text-[9px] uppercase tracking-widest text-gray-500 mb-1 font-bold">Wallet Balance</p>
                <p class="text-4xl font-bold tracking-tight">0</p>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <a href="index.html" class="nav-item active">
            <span class="text-xl">🎮</span>
            <span class="text-[9px] font-bold mt-1">GAME</span>
            <div class="active-dot"></div>
        </a>
        <a href="scores.html" class="nav-item">
            <span class="text-xl">🏆</span>
            <span class="text-[9px] font-bold mt-1">SCORES</span>
        </a>
        <a href="history.html" class="nav-item">
            <span class="text-xl">🕒</span>
            <span class="text-[9px] font-bold mt-1">HISTORY</span>
        </a>
        <a href="wallet.html" class="nav-item">
            <span class="text-xl">💼</span>
            <span class="text-[9px] font-bold mt-1">WALLET</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="text-xl">👤</span>
            <span class="text-[9px] font-bold mt-1">PROFILE</span>
        </a>
    </div>

    <div id="rulesModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-6 z-50 backdrop-blur-sm">
        <div class="bg-[#1a1a3a] border border-gray-700 w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl text-center">
            <h3 class="text-xl font-bold text-yellow-500 mb-4 italic">የጨዋታው ህግጋት 📜</h3>
            <p class="text-sm text-gray-300 leading-relaxed mb-6">
                ለመጀመር የ 10 ብር Stake ይምረጡ። ቁጥሮች በዘፈቀደ ይወጣሉ። ቀድሞ የሞላ 'Bingo' ይላል። ያሸነፉት ገንዘብ ወደ Wallet ይገባል።
            </p>
            <button onclick="toggleRules()" class="w-full bg-gray-700 py-3 rounded-xl font-bold text-sm">ተረዳሁ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
