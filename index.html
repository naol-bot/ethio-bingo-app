<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ethio Bingo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <span class="logo">ETHIO BINGO</span>
            <button class="rules-btn" id="rules-btn">Rules</button>
        </header>

        <main class="main-card">
            <p id="welcome-user">Welcome</p>
            <h1 class="brand-name">ETHIO BINGO</h1>
            <p style="font-size: 0.8rem; color: #848d97; letter-spacing: 1px;">CHOOSE YOUR STAKE</p>
            
            <button class="play-btn">▶ PLAY 10</button>

            <div style="margin-top: 20px;">
                <p style="font-size: 0.8rem; color: #848d97;">WALLET BALANCE</p>
                <h2 id="user-balance" style="font-size: 2.5rem; margin-top: 5px;">0</h2>
            </div>
        </main>

        <div id="rules-modal" class="modal">
            <div class="modal-content">
                <span id="close-modal" style="position: absolute; right: 20px; top: 10px; font-size: 24px; cursor: pointer;">&times;</span>
                <h2 style="color: #f59e0b; margin-bottom: 15px;">የጨዋታው ህጎች</h2>
                <div style="text-align: left; line-height: 1.8;">
                    <p>1. ማስጠቢያ 10 ብር ነው።</p>
                    <p>2. ቀድሞ የሞላ ተጫዋች ያሸንፋል።</p>
                    <p>3. መልካም ዕድል!</p>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">🎮<br>GAME</a>
            <a href="scores.html" class="nav-item">🏆<br>SCORES</a>
            <a href="history.html" class="nav-item">🕒<br>HISTORY</a>
            <a href="wallet.html" class="nav-item">💼<br>WALLET</a>
            <a href="profile.html" class="nav-item">👤<br>PROFILE</a>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
