<!DOCTYPE html>

</head>
<body>

        <div class="header">
            <span class="logo-text">ETHIO BINGO</span>

                <p>WALLET BALANCE</p>

        </div>

        <div class="bottom-nav">
            <div class="nav-item active">🎮<br>GAME</div>
            <div class="nav-item">🏆<br>SCORES</div>

        </div>
