<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ethio Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f0c29] text-white min-h-screen flex flex-col font-sans overflow-x-hidden m-0 p-0">

    <div class="flex justify-between items-center p-5 w-full">
        <h1 class="text-sm font-bold tracking-widest opacity-80">ETHIO BINGO</h1>
        <button onclick="toggleRules()" class="bg-gray-800/60 border border-gray-600 px-5 py-1 rounded-full text-xs hover:bg-gray-700 transition">Rules</button>
    </div>

    <div class="flex-grow flex flex-col items-center justify-center w-full px-4 -mt-10">
        <p class="text-gray-400 text-lg mb-1">Welcome to</p>
        <h2 class="text-5xl font-black text-yellow-500 italic mb-12 tracking-tighter">
            ETHIO BINGO
        </h2>

        <div class="play-card py-12 px-6 flex flex-col items-center shadow-2xl relative">
            <p class="text-[10px] uppercase tracking-[0.3em] text-gray-500 mb-4 font-bold">Choose your stake</p>
            
            <div class="w-12 h-[3px] bg-yellow-500 rounded-full mb-10 shadow-[0_0_15px_#eab308]"></div>

            <button id="playBtn" class="w-full bg-[#00c896] text-[#0f0c29] text-2xl font-black py-5 rounded-[1.5rem] flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <span class="text-xl">▶</span> PLAY 10
            </button>

            <div class="mt-12 text-center">
                <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 font-bold">Wallet Balance</p>
                <p class="text-5xl font-bold tracking-tight">0</p>
            </div>
        </div>
    </div>

    <div class="bg-[#0a0a1f] border-t border-gray-900 flex justify-around py-4 pb-8 w-full fixed bottom-0">
        
        <a href="index.html" class="flex flex-col items-center">
            <span class="text-2xl active-nav">🎮</span>
            <span class="text-[10px] font-bold mt-1 active-nav">GAME</span>
            <div class="active-dot"></div> </a>

        <a href="scores.html" class="flex flex-col items-center">
            <span class="text-2xl inactive-nav">🏆</span>
            <span class="text-[10px] font-bold mt-1 inactive-nav">SCORES</span>
        </a>

        <a href="history.html" class="flex flex-col items-center">
            <span class="text-2xl inactive-nav">🕒</span>
            <span class="text-[10px] font-bold mt-1 inactive-nav">HISTORY</span>
        </a>

        <a href="wallet.html" class="flex flex-col items-center">
            <span class="text-2xl inactive-nav">💼</span>
            <span class="text-[10px] font-bold mt-1 inactive-nav">WALLET</span>
        </a>

        <a href="profile.html" class="flex flex-col items-center">
            <span class="text-2xl inactive-nav">👤</span>
            <span class="text-[10px] font-bold mt-1 inactive-nav">PROFILE</span>
        </a>
    </div>

    <div id="rulesModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-[#1a1a3a] border border-gray-700 w-full max-w-xs rounded-[2rem] p-8 shadow-2xl">
            <h3 class="text-xl font-bold text-yellow-500 mb-4 tracking-tight">የጨዋታው ህግጋት 📜</h3>
            <ul class="text-sm text-gray-300 space-y-4 leading-relaxed">
                <li>• ለመጀመር የ 10 ብር Stake ይምረጡ።</li>
                <li>• ቁጥሮች በዘፈቀደ (Random) ይወጣሉ።</li>
                <li>• ቀድሞ የሞላ 'Bingo' ይላል።</li>
                <li>• ያሸነፉት ገንዘብ ወደ Wallet ይገባል።</li>
            </ul>
            <button onclick="toggleRules()" class="w-full mt-8 bg-gray-700 hover:bg-gray-600 py-3 rounded-xl font-bold transition">ተረዳሁ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
