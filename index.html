<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ethio Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f0c29] text-white min-h-screen flex flex-col font-sans overflow-hidden m-0 p-0">

    <div id="welcomeScreen" class="flex flex-col min-h-screen">
        <div class="flex justify-between items-center p-5 w-full">
            <h1 class="text-[10px] font-bold tracking-[0.2em] opacity-60 uppercase">Ethio Bingo</h1>
            <button onclick="toggleRules()" class="bg-gray-800/40 border border-gray-700 px-4 py-1 rounded-full text-[10px]">Rules</button>
        </div>

        <div class="flex-grow flex flex-col items-center justify-center -mt-10">
            <p class="text-gray-400 text-sm mb-1">Welcome to</p>
            <h2 class="text-yellow-500 text-center text-4xl font-black mb-6 italic">ETHIO BINGO</h2>

            <div class="play-card flex flex-col items-center bg-[#1a1a3a]/50 p-10 rounded-[2rem] border border-gray-800 shadow-2xl">
                <p class="text-[9px] uppercase tracking-[0.3em] text-gray-500 mb-4 font-bold">Choose your stake</p>
                <div class="w-10 h-[2px] bg-yellow-500 rounded-full mb-8 shadow-[0_0_10px_#eab308]"></div>

                <button id="playBtn" onclick="startPlay()" class="bg-[#22c55e] hover:bg-[#1bad4f] text-white font-black px-12 py-4 rounded-2xl text-lg shadow-lg transition-all active:scale-95">
                    ▶️ PLAY 10
                </button>

                <div class="mt-8 text-center">
                    <p class="text-[9px] uppercase tracking-widest text-gray-500 mb-1 font-bold">Total Balance</p>
                    <p id="totalBalanceDisplay" class="text-4xl font-bold tracking-tight">0</p>
                </div>
            </div>
        </div>
    </div>

    <div id="mainGameScreen" class="fixed inset-0 bg-[#0f0c29] z-40 hidden flex flex-col p-2 overflow-y-auto pb-32">
        <div class="sticky top-0 bg-[#0f0c29] z-50 p-2 border-b border-gray-800">
            <div class="flex justify-between items-center mb-2">
                <button onclick="closeGame()" class="text-[10px] bg-gray-800 px-3 py-1 rounded-lg border border-gray-700">← Back</button>
                <div id="game-timer" class="bg-yellow-500/10 border border-yellow-600/50 text-yellow-500 font-black px-4 py-1 rounded-xl text-sm transition-all duration-300">
                    45 s
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-1">
                <div class="bg-gray-900/80 p-1 rounded border border-gray-700 text-center">
                    <p class="text-[7px] text-gray-400 uppercase tracking-tighter">Main Wallet</p>
                    <p id="main-wallet-display" class="text-[11px] font-bold text-white">0</p>
                </div>
                <div class="bg-gray-900/80 p-1 rounded border border-gray-700 text-center">
                    <p class="text-[7px] text-gray-400 uppercase tracking-tighter">Play Wallet</p>
                    <p id="play-wallet-display" class="text-[11px] font-bold text-white">0</p>
                </div>
                <div class="bg-gray-900/80 p-1 rounded border border-gray-700 text-center">
                    <p class="text-[7px] text-gray-400 uppercase tracking-tighter">Stake</p>
                    <p class="text-[11px] font-bold text-white">10</p>
                </div>
            </div>
        </div>

        <div id="numbers-grid" class="grid grid-cols-8 gap-1.5 mt-4 p-1">
            </div>

        <div id="cartela-section" class="mt-6 p-2 hidden">
            <div id="cartela-container" class="flex flex-wrap justify-center gap-4">
                </div>
        </div>
    </div>

    <div id="rulesModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-6 z-50 backdrop-blur-sm">
        <div class="bg-[#1a1a3a] border border-gray-700 w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl text-center">
            <h3 class="text-xl font-bold text-yellow-500 mb-4 italic">የጨዋታው ህግጋት 📜</h3>
            <p class="text-sm text-gray-300 leading-relaxed mb-6">ለመጀመር የ 10 ብር Stake ይምረጡ። 4 ሰከንድ እስኪቀረው ቁጥር መምረጥ ይችላሉ። የያዙት ካርቴላ ካሸነፈ ገንዘቡ ወደ Main Wallet ይገባል።</p>
            <button onclick="toggleRules()" class="w-full bg-gray-700 py-3 rounded-xl font-bold text-sm text-white">ተረዳሁ</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function toggleRules() {
            document.getElementById('rulesModal').classList.toggle('hidden');
        }
    </script>
</body>
</html>
