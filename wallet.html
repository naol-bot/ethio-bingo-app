<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Ethio Bingo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <span class="logo">MY WALLET</span>
        </header>

        <main class="main-content">
            <div class="balance-card">
                <p>Current Balance</p>
                <h1>100.00 ETB</h1>
            </div>

            <div class="wallet-actions">
                <button class="action-btn deposit">Deposit (ብር አስገባ)</button>
                <button class="action-btn withdraw">Withdraw (ብር አውጣ)</button>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fas fa-gamepad"></i>
                <span>GAME</span>
            </a>
            <a href="scores.html" class="nav-item">
                <i class="fas fa-trophy"></i>
                <span>SCORES</span>
            </a>
            <a href="history.html" class="nav-item">
                <i class="fas fa-history"></i>
                <span>HISTORY</span>
            </a>
            <a href="wallet.html" class="nav-item active">
                <i class="fas fa-wallet"></i>
                <span>WALLET</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>PROFILE</span>
            </a>
        </nav>
    </div>
</body>
</html>
